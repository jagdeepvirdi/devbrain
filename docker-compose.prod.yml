services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-devbrain}
      POSTGRES_USER:     ${POSTGRES_USER:-devbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devbrain} -d ${POSTGRES_DB:-devbrain}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  app:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-devbrain}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-devbrain}
      OLLAMA_URL:        http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-mistral}
      PORT:              3001
      JWT_SECRET:        ${JWT_SECRET:?JWT_SECRET must be set}
      AUTH_PASSWORD:     ${AUTH_PASSWORD:?AUTH_PASSWORD must be set in production}
      USE_CLAUDE:        ${USE_CLAUDE:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FORCE_HTTPS:       true
      NODE_ENV:          production
      ENCRYPT_KEY:       ${ENCRYPT_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pg_data:
  caddy_data:
  caddy_config:
