name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  server:
    name: Server — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

  client:
    name: Client — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [server, client]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: devbrain
          POSTGRES_USER: devbrain
          POSTGRES_PASSWORD: devbrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:      postgresql://devbrain:devbrain@localhost:5432/devbrain
      JWT_SECRET:        ci-e2e-test-secret-min-16-chars
      OLLAMA_URL:        http://localhost:11434
      NODE_ENV:          development
      PORT:              3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Setup database schema
        run: npx tsx db/setup.ts
        working-directory: server

      - name: Build server
        run: npm run build
        working-directory: server

      - name: Start API server
        run: npm start > /tmp/server.log 2>&1 &
        working-directory: server

      - name: Wait for API server
        run: npx --yes wait-on tcp:3001 --timeout 60000

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/server.log

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: client

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: client
        env:
          CI: 'true'

      - name: Upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: client/test-results/
          retention-days: 7
